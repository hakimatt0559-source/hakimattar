<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maghnia Chattia | المتجر</title>

  <!-- تحميل خط Tajawal من Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* ===== إعادة تعريف متغيرات التصميم الأصلية ===== */
    :root {
      --radius: 1rem;

      --background: oklch(0.97 0.012 75);
      --foreground: oklch(0.22 0.025 50);
      --card: oklch(1 0.003 80);
      --card-foreground: oklch(0.22 0.025 50);
      --primary: oklch(0.68 0.16 55);
      --primary-foreground: oklch(0.99 0.01 80);
      --secondary: oklch(0.93 0.02 75);
      --secondary-foreground: oklch(0.28 0.03 50);
      --muted: oklch(0.94 0.012 75);
      --muted-foreground: oklch(0.50 0.025 55);
      --accent: oklch(0.55 0.08 145);
      --accent-foreground: oklch(0.99 0.01 80);
      --destructive: oklch(0.58 0.20 28);
      --border: oklch(0.22 0.025 50 / 0.10);
      --input: oklch(0.22 0.025 50 / 0.12);
      --ring: oklch(0.68 0.16 55);
      --gold: oklch(0.74 0.13 75);
      --saffron: oklch(0.68 0.16 55);
      --cardamom: oklch(0.55 0.08 145);
      --spice: oklch(0.58 0.20 28);

      --font-display: "Tajawal", "IBM Plex Sans Arabic", system-ui, sans-serif;
      --font-body: "Tajawal", "IBM Plex Sans Arabic", system-ui, sans-serif;

      --shadow-card: 0 1px 2px oklch(0.30 0.05 50 / 0.05), 0 8px 24px -10px oklch(0.30 0.05 50 / 0.10);
      --gradient-glass: linear-gradient(180deg, oklch(1 0 0 / 0.85), oklch(1 0 0 / 0.65));
      --gradient-hero: radial-gradient(ellipse at 20% 0%, oklch(0.68 0.16 55 / 0.10), transparent 55%),
                        radial-gradient(ellipse at 90% 100%, oklch(0.55 0.08 145 / 0.06), transparent 55%),
                        linear-gradient(180deg, oklch(0.98 0.012 80), oklch(0.96 0.015 70));
    }

    /* ===== أساسيات الصفحة ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      border-color: var(--border);
    }

    html {
      font-family: var(--font-body);
    }

    body {
      background-color: var(--background);
      color: var(--foreground);
      background-image: var(--gradient-hero);
      background-attachment: fixed;
      min-height: 100vh;
      padding: 16px;
    }

    h1, h2, h3, h4 {
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: 0;
    }

    /* ===== تأثير البطاقة الزجاجية (مطابق للأصل) ===== */
    .glass-card {
      background: var(--gradient-glass);
      backdrop-filter: blur(16px) saturate(140%);
      border: 1px solid oklch(0.22 0.025 50 / 0.06);
      box-shadow: var(--shadow-card);
      border-radius: var(--radius);
    }

    /* ===== header ===== */
    .site-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .site-title {
      font-size: 2.2rem;
      font-weight: 800;
      background-image: linear-gradient(135deg, oklch(0.55 0.18 50), oklch(0.68 0.16 55), oklch(0.62 0.20 35));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .site-subtitle {
      color: var(--muted-foreground);
      font-size: 1rem;
      margin-top: 0.25rem;
    }

    /* ===== شبكة المنتجات ===== */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .product-card {
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 30px -15px oklch(0.30 0.05 50 / 0.15);
    }

    .product-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background: var(--muted);
    }

    .product-body {
      padding: 1rem 1.25rem 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--foreground);
      margin-bottom: 0.5rem;
    }

    .product-description {
      font-size: 0.9rem;
      color: var(--muted-foreground);
      margin-bottom: 1rem;
      line-height: 1.6;
      flex: 1;
    }

    .product-price {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--saffron);
      margin-bottom: 0.75rem;
    }

    .btn-add {
      background: var(--primary);
      color: var(--primary-foreground);
      border: none;
      border-radius: 0.75rem;
      padding: 0.6rem 1.2rem;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s ease;
      width: 100%;
    }

    .btn-add:hover {
      background: oklch(0.60 0.15 50);
    }

    /* ===== حالات فارغة وخطأ ===== */
    .empty-state, .error-state {
      text-align: center;
      padding: 3rem;
      color: var(--muted-foreground);
      font-size: 1.2rem;
      background: var(--gradient-glass);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
    }

    .error-state {
      color: var(--destructive);
    }

    /* ===== footer بسيط ===== */
    .site-footer {
      text-align: center;
      margin-top: 3rem;
      color: var(--muted-foreground);
      font-size: 0.9rem;
    }

    .retry-btn {
      background: var(--secondary);
      color: var(--secondary-foreground);
      border: none;
      border-radius: 0.75rem;
      padding: 0.6rem 1.4rem;
      font-family: var(--font-body);
      font-weight: 700;
      margin-top: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .retry-btn:hover {
      background: oklch(0.88 0.02 70);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <h1 class="site-title">Maghnia Chattia</h1>
    <p class="site-subtitle">متجر التوابل و الأعشاب الفاخرة</p>
  </header>

  <main>
    <div id="products-container" class="products-grid">
      <!-- جاري التحميل -->
      <div class="empty-state">جاري تحميل المنتجات...</div>
    </div>
  </main>

  <footer class="site-footer">
    © 2026 Maghnia Chattia. جميع الحقوق محفوظة.
  </footer>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://zfdllkmdrjuzmvxanzgz.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmZGxsa21kcmp1em12eGFuemd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MjI0MDEsImV4cCI6MjA5ODA5ODQwMX0.rhsciAdi1NkaeapxdsER7jLZYtdWXfATepX-9umOlNQ';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const container = document.getElementById('products-container');

    async function loadProducts() {
      const { data, error } = await supabase
        .from('products')
        .select('*');

      if (error) {
        container.innerHTML = `
          <div class="error-state" style="grid-column: 1/-1;">
            ⚠️ خطأ في تحميل المنتجات: ${error.message}
            <br>
            <button class="retry-btn" onclick="loadProducts()">إعادة المحاولة</button>
          </div>`;
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            🧂 لا توجد منتجات حالياً. يرجى إضافة منتجات جديدة.
          </div>`;
        return;
      }

      container.innerHTML = data.map(product => `
        <div class="product-card glass-card">
          <img 
            src="${product.image_url || 'https://placehold.co/400x300/oklch(0.94 0.012 75)/oklch(0.50 0.025 55)?text=منتج'}" 
            alt="${product.name}" 
            class="product-image"
            loading="lazy"
          >
          <div class="product-body">
            <h3 class="product-name">${product.name}</h3>
            <p class="product-description">${product.description || 'منتج طبيعي فاخر من متجرنا.'}</p>
            <span class="product-price">${product.price} د.ج</span>
            <button class="btn-add">🛒 أضف إلى السلة</button>
          </div>
        </div>
      `).join('');
    }

    loadProducts();
  </script>
</body>
</html>
